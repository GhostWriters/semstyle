[metadata]
name        = "Midnight"
description = "A small cool-toned theme demonstrating loading from an actual file on disk."
author      = "semstyle examples"

[palette]
accent = "#00CFFF"
ok     = "#90EE90"

[styles]
# Notice and Success pull from the palette; Warn and Muted use colors
# directly, showing palette references and inline colors both work.
Notice  = "{{[$accent]}}"
Warn    = "{{[#FFB347]}}"
Success = "{{[$ok::B]}}"
Muted   = "{{[white]}}"

# Styles can reference other styles by name and layer modifier overrides on top.
NoticeBold = "{{|Notice:::B|}}"

[defaults]
border_color = "$accent"
